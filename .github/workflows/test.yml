name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV:         test
      POSTGRES_HOST:     localhost
      POSTGRES_PORT:     "5432"
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       rbrun_error_reporter_test

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version:    "3.4"
          bundler-cache:   true   # caches bundle install

      - name: Create test database
        run: |
          PGPASSWORD=postgres createdb -h localhost -U postgres rbrun_error_reporter_test

      - name: Run tests
        run: bundle exec rake test

      - name: Rubocop
        run: bundle exec rubocop
